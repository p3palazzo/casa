# <lido:objectRelationWrap>                                         {{{3
# <lido:subjectWrap> (DCMI coverage:subject)                        {{{4
########################################################################
# Recomenda-se articular o tema em três níveis :
# descrição, identificação e interpretação.
# 1. DESCRIÇÃO se refere a elementos imediatamente reconhecíveis sem
#    necessidade de conhecimento especializado : coluna(ta)s, arcadas,
#    brasões, cunhais, ornamentos em geral.
# 2. IDENTIFICAÇÃO se refere ao reconhecimento das particularidades
#    arquitetônicas ou iconográficas dos elementos : p. ex. as colunas
#    são da ordem toscana, a abóbada é de aresta, o brasão pertence a
#    tal família...
# 3. INTERPRETAÇÃO diz respeito ao significado iconológico, alegórico
#    ou político dos elementos, incluindo questões de status e estilo.
########################################################################
subject:
# <lido:subjectSet>                                                 {{{5
  # Repetir tantas vezes quanto necessário.
  - display: # <lido:displaySubject xml:lang="@lang">               {{{6
      - lang: "pt"
        text: ""
    # <lido:subject lido:type="@type">                              {{{6
    # Para o tipo de tema, seguir o vocabulário controlado em:
    # http://terminology.lido-schema.org/subject_type
    # Equivalentes VRA Core:
    # conceptTopic, descriptiveTopic, iconographicTopic, otherTopic
    type: "descriptiveTopic"
    extent: "" # <lido:extentSubject><skos:Concept [Objects Facet]>
    # Usar vocabulário controlado para apresentar o tema em termos de
    # descrição, identificação ou interpretação:
    href: ""   # <lido:subjectConcept><skos:Concept>
    # Caso uma pessoa, família, grupo ou corporação esteja representado
    # (por exemplo, para identificar um brasão), usar o grupo abaixo.
    # Atenção: não se trata de identificar a autoria e sim quem está
    # retratado ou representado na iconografia!
    # Não usar para pessoas alegóricas (p. ex. Minerva, Clio, o
    # Espírito Santo) mas somente para pessoas reais retratadas na sua
    # especificidade (p. ex. D. João VI, S. Francisco de Assis,
    # autorretrato do artista...)
    # Seguir a mesma estrutura que `temporal: event: actor`.
    actor: # <lido:subjectActor>
    # De igual modo, caso a iconografia retrate algum evento histórico,
    # usar o grupo `event`.
    # Novamente, não se refere ao evento de produção da iconografia,
    # nem a uma data inscrita na edificação, nem a um evento alegórico
    # (p. ex. Titanomaquia, Dilúvio bíblico...) mas a um acontecimento
    # verdadeiro ou presumido representado no elemento iconográfico.
    # Seguir a mesma estrutura que `temporal: event`.
    event: # <lido:subjectEvent>
    # Continuando, usar o grupo abaixo para nomear lugares verdadeiros
    # representados na iconografia.
    # Não usar para lugares alegóricos (Paraíso, Cocanha...).
    # Seguir a mesma estrutura que `spatial: location`.
    location: # <lido:subjectPlace>
    # Por fim, o grupo abaixo permite indicar objetos representados
    # na iconografia. Não usar para conceitos de objetos (p. ex.
    # pinha, folha de acanto, martelo de Thor) mas APENAS para objetos
    # específicos (p. ex. a fachada da igreja de São Francisco de Assis
    # retratada num mural de azulejos)
    object: # <lido:subjectObject>
#   </lido:subject>
# </lido:subjectSet>
# </lido:subjectWrap>
# -------------------------------------------------------------------- #
# <lido:relatedWorksWrap> (DCMI relation)                           {{{4
########################################################################
# As formas mais comuns de relação no nosso projeto são :
#
# - depicted in: A edificação é representada numa pintura ou desenho
#   artístico;
#
# - documented by: Informações sobre a edificação estão publicadas numa
#   referência bibliográfica, processo administrativo ou outro documento
#   textual impresso, manuscrito ou eletrônico;
#
# - has plan / has floor plan / has section / has elevation / has rendering:
#   Essas relações mostram a existência de desenhos técnicos da
#   edificação, sejam eles históricos ou recentes, compilados de fontes
#   externas a este projeto de pesquisa.
#
# - has construction drawing / has design / has sketch:
#   Essas relações se referem a desenhos históricos (fontes primárias)
#   que atestam o processo de projeto da edificação.
#
########################################################################
# ATENÇÃO : OS DESENHOS PRODUZIDOS POR ESTE PROJETO DE PESQUISA DEVEM  #
#           SER CADASTRADOS NO GRUPO `RESOURCE`, MAIS ABAIXO.          #
# O grupo `relation` é destinado unicamente a cadastrar relações desta #
# edificação com objetos autônomos, tais como outras edificações,      #
# conjuntos urbanos, obras de artes visuais, referências               #
# bibliográficas ou acervos arquivísticos.                             #
########################################################################
relation:
  # <lido:relatedWorksSet lido:sortorder="@sortorder">              {{{5
  - sortorder: # [1-n]
    display: # <lido:displayRelatedWork xml:lang="@lang">           {{{6
      lang: "pt"
      text: ""
  # <lido:relatedWorkRelType><skos:Concept>                         {{{6
    type: "" # http://terminology.lido-schema.org/relatedWorkRelType
    # ATENÇÃO: A obra titular desta ficha é o SUJEITO da relação.
    # Portanto, se estamos citando uma pintura que retrata a edificação
    # objeto desta ficha, o tipo de relação será "Is Depicted In", na
    # voz passiva.
  # </lido:relatedWorkRelType>
  # <lido:relatedWork>                                              {{{6
    displayObject: # <lido:displayObject xml:lang="@lang">          {{{7
      - lang: "pt"
        text: ""
    # <lido:object>                                                 {{{7
    # Para objetos não cadastrados no nosso banco de dados,
    # usar preferencialmente um identificador universal como Wikidata.
    object: # <lido:objectID> Formatar como o grupo <lido:objectPublishedID>
    # Preencher os grupos abaixo no caso de o objeto não estar
    # cadastrado nas nossas bases de dados.
    webResource: # <lido:objectWebResource>
      - href: ""
    type: # <lido:objectType> Formatar como o grupo <lido:objectWorkTypeWrap>
    name: # <lido:objectName> Formatar como o grupo <lido:titleSet>
    note: # <lido:objectNote>
      - lang: "pt"
        text: ""
    # </lido:object>
  # </lido:relatedWork>
  # <lido:sourceRelatedWorkSet>                                     {{{6
    # O grupo `source` serve para indicar fontes de informação SOBRE
    # este relacionamento. No caso de uma relação de referência
    # bibliográfica (is documented by), a referência deve ser cadastrada
    # como sendo o próprio objeto relacionado <lido:relatedWork>.
    source: # Formatar como os demais grupos `source`.
  # </lido:sourceRelatedWorkSet>
# </lido:descriptiveMetadata>                                       {{{2
