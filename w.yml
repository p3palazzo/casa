        # <lido:rightsHolder>
        # Formatar como `legalBody` mesmo em se tratando de pessoa física.
        holder:
            # <lido:legalBodyID lido:type="@type">refid</lido:legalBodyID>
          - type : "http://terminology.lido-schema.org/lido00099" # local
            refid: "00.038.174/0001-43"
