    # <lido:rightsResource>                                         {{{5
    rights:
        # Generic or specific: http://terminology.lido-schema.org/rightsType_type
      - type: "generic"
        href: "https://creativecommons.org/licenses/by-sa/4.0/"
        display: # <lido:creditLine>
          - lang : "pt"
