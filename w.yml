########################################################################
#                                                                 {{{1 #
# Este arquivo é um gabarito (template). Todas as informações de cada  #
# ficha de obra que forem idênticas ao que já consta deste arquivo     #
# NÃO PRECISAM ser repetidas na ficha.                                 #
# -------------------------------------------------------------------- #
# Todos os campos abaixo são definidos pela especificação LIDO:        #
# https://icom-documentation.mini.icom.museum/working-groups/lido/lido-overview/
# -------------------------------------------------------------------- #
# O caractere '#' indica o início de um comentário, que prossegue      #
# até o final da linha. Os comentários e as linhas que contêm apenas   #
# comentários podem ser apagados das fichas.                           #
# Linhas que contêm campos não preenchidos ou idênticos aos deste      #
# template também podem ser apagadas das fichas.                       #
# -------------------------------------------------------------------- #
# Todos os blocos que começam com um hífen `-` são listas que podem    #
# conter qualquer número de linhas ou blocos.                          #
# -------------------------------------------------------------------- #
# A ordem dos blocos não é importante, mas a hierarquia dentro de cada #
# bloco e a indentação de dois espaços por nível hierárquico, sim.     #
########################################################################
########################################################################
##                        CAMPOS OBRIGATÓRIOS                    {{{1 ##
########################################################################
########################################################################
# -------------------------------------------------------------------- #
########################################################################
#                          Bloco 1 : Cadastro                    {{{2  #
########################################################################
# <lido:lidoRecID lido:type="http://terminology.lido-schema.org/lido00100" lido:source="">
#   arqtrad/casa/PlusCode+11
#   <!--
#      -Cadastrar somente o PlusCode+11 no campo abaixo, os prefixos
#      -serão acrescentados na exportação.
#      -->
id:
    # Para calcular o PlusCode+11 (Open Location Code com precisão
    # de 11 caracteres), seguir os passos abaixo:
    #
    # 1. Instalar o plugin Lat Lon Tools no QGIS.
    # 2. Obter o polígono georreferenciado do imóvel num levantamento
    #    georreferenciado,
    #    na base cartográfica cadastral do município, ou, na falta dela,
    #    carregar o Global Building Atlas LoD1 no QGIS.
    # 3. Reprojetar o polígono para EPSG:4326 - WGS84.
    # 4. Com o polígono da edificação selecionado, rodar o comando:
    #    Vector > Geometry Tools > Centroids, com as opções
    #    "selected features only" e "Create temporary layer"
    # 5. Com o Layer "Centroids" selecionado, rodar o comando:
    #    Plugins > Lat Lon Tools > Conversions > Point Layer to Plus Codes,
    #    com a opção: "Plus Codes length" = 11.
    # 6. Clicando com o botão direito no layer escolhido, selecionar
    #    "Open Attribute Table" e copiar o valor do campo "pluscodes".
# </lido:lidoRecID>
# -------------------------------------------------------------------- #
# <lido:category>
#   <skos:Concept rdf:about="http://terminology.lido-schema.org/lido00096">
#     <skos:prefLabel xml:lang="pt">Artefato</skos:prefLabel>
#     <skos:prefLabel xml:lang="en">Human-made object</skos:prefLabel>
#     <skos:prefLabel xml:lang="de">Künstlicher Gegenstand</skos:prefLabel>
#     <skos:exactMatch>http://vocab.getty.edu/aat/300386957</skos:exactMatch>
#     <skos:exactMatch>http://erlangen-crm.org/current/E22_Human-Made_Object</skos:exactMatch>
#   </skos:Concept>
# </lido:category>
# <lido:applicationProfile lido:type="http://terminology.lido-schema.org/lido00099">
#   https://lido-schema.org/profiles/v1.1/lido-v1.1-profile-architecture-v1.0.xsd
# </lido:applicationProfile>
# -------------------------------------------------------------------- #
########################################################################
#                         Bloco 2 : Descrição                     {{{2 #
########################################################################
# <lido:descriptiveMetadata xml:lang="pt">
# <!--
#    -Na exportação, haverá um único bloco <lido:descriptiveMetadata>
#    -compreendendo os campos obrigatórios e os opcionais.
#    -->
# <lido:objectClassificationWrap>                          <!-- {{{3 -->
# <lido:objectWorkTypeWrap>                                <!-- {{{4 -->
workType:
# Incluir o maior número possível de categorias tiplógicas conforme:
# http://terminology.lido-schema.org/objectWorkType_type
# Em particular, indicar o contexto (urbano/rural), morfotipologia e
# estado de conservação e de preservação.
  - type: "http://terminology.lido-schema.org/lido00767"
    href: ""
# </lido:objectWorkTypeWrap>
# -------------------------------------------------------------------- #
# <lido:objectIdentificationWrap>                          <!-- {{{3 -->
# <lido:titleWrap>                                         <!-- {{{4 -->
# <lido:titleSet lido:type="">
# Um objeto pode ser conhecido por mais de um nome.
# Por motivo de compatibilidade com sites, o título principal é
# cadastrado separadamente dos títulos alternativos.
# Se a edificação não tiver título próprio, usar como título o
# endereço na forma "Casa à rua Tal, 111"
# <lido:appellationValue lido:pref="http://terminology.lido-schema.org/lido00169" xml:lang="pt">
title: ""
# </lido:appellationValue>
titleType: "https://vocab.getty.edu/aat/300417199"
# Os tipos de título estão listados na hierarquia do Getty:
# http://vocab.getty.edu/page/aat/300417193
# Equivalentes DCMI: brandName, cited, creator, descriptive, former, inscribed, owner, popular, repository, translated, other
# <lido:sourceAppellation>
# A fonte do título é opcional ; um título pode ser atestado em mais de
# uma fonte. Equivalente DCMI: bibliographiCitation
titleSource:
  - citekey: "" # Consultar a biblioteca do grupo de pesquisa no Zotero.
    href: ""    # Caso não tenha DOI ou outro URI, omitir esta linha.
    text: ""    # Citação formatada.
# </lido:sourceAppellation>
# </lido:titleSet>
# </lido:titleWrap>
# -------------------------------------------------------------------- #
# DCMI spatial (continua <lido:objectIdentificationWrap>)  <!-- {{{3 -->
spatial:
# <lido:repositoryWrap>                                    <!-- {{{4 -->
  location:
  # <lido:repositorySet>
    - type: "http://terminology.lido-schema.org/lido01018"
      # O tipo de local padrão é "current location".
      # Outro tipos de localização possíveis:
      # http://terminology.lido-schema.org/repositorySet_type
      # Equivalentes DCMI: site, formerSite, intended, other
    # <lido:displayRepository>
    # O nome da localização é opcional, mas recomendado para cadastrar
    # o endereço postal ou outra identificação nomeável do local.
      name:
        # LIDO não prevê um tipo para o <displayRepository>.
        # DublinCore: corporate, geographic, personal, other
        type: "geographic"
        text: ""
    # </lido:displayRepository>
    # <lido:repositoryLocation>
      city : "" # Município (concelho) atual onde se situa a edificação
      state: "" # Nome do estado ou distrito segundo a ISO 3166-2. O nome do país está implícito.
  # Latitude e longitude devem ser derivadas do centróide do polígono definido acima,
  # ou então de uma fonte de autoridade como o SICG (Brasil) ou o SIPA (Portugal).
        locationHistoric: # Preencher caso o nome do município ou a jurisdição do termo municipal tenham mudado, ou se houver outra nomenclatura histórica relevante para o lugar.
          - text: ""
      # <lido:gml>
      lat: # Em graus decimais, negativos para o Sul e Oeste.
      lon: # Separar os decimais com ponto em vez de vírgula.
      alt: # Em metros acima do nível do mar.
#       </lido:gml>
#     </lido:repositoryLocation>
#   </lido:repositorySet>
# </lido:repositoryWrap>
# -------------------------------------------------------------------- #
  extent:
    type: "MultiPolygon"
    coordinates:
    # Como obter as coordenadas em formato JSON:
    # 1. Selecionar o polígono da edificação seguindo os passos 1 a 3 nas linhas 26 a 30, acima.
    # 2. Rodar o comando Plugin > Lat Lon Tools > Geometry to WKT/JSON
    # 3. Selecionar "Selected features only", "Output format type" = JSON
    # 4. Copiar o valor do campo "coordinates", incluindo os colchetes,
    #    e colar na linha acima.
    projection: "EPSG:4326 WGS84" # Substituir pela projeção da planta cadastral municipal ou do levantamento georreferenciado, caso sejam usados
    source: "Global Building Atlas LoD1" # Substituir pelo URI da planta cadastral municipal ou do levantamento georreferenciado, caso sejam usados
    href:
# -------------------------------------------------------------------- #
# </lido:objectIdentificationWrap>
date: # Data da última atualização da ficha no nosso repositório no formato ISO 8601 (AAAA-MM-DD). # lido:recordInfoSet > lido:recordMetadataDate
author: "" # Quem incluiu a ficha no repositório e preencheu esta ficha. Não confundir com o campo `creator` abaixo.
description: >-
# Descrição sucinta para aparecer em listagens, texto sem formatação.
# Começar na linha abaixo da legenda, deixando dois espaços em branco no início
# de cada linha. O ideal é se ater a no máximo 3 linhas de 72 toques.
# O conteúdo do campo `description` NÃO vai entre aspas.
# </lido:descriptiveMetadata>
########################################################################
########################################################################
##                         CAMPOS OPCIONAIS                      {{{1 ##
########################################################################
########################################################################
#             Omitir as linhas ou os blocos não preenchidos            #
########################################################################
#                          Bloco 1 : Cadastro                     {{{2 #
########################################################################
# <lido:objectPublishedID lido:type="">
#   <!--
#      -Outros cadastros existentes no SICG ou no SIPA, catálogos,
#      -inventários, manifesto IIIF, Wikidata, etc.
#      -lido:type --- http://terminology.lido-schema.org/identifier_type
#      -
#      -Na exportação, o tipo deve ser automaticamente configurado como
#      -URI: http://terminology.lido-schema.org/lido00099
#      -se o campo `href` existir, caso contrário será considerado
#      -Local Identifier: http://terminology.lido-schema.org/lido00100
#      -
#      -Quando existir uma URI, o campo `source` é opcional, mas o campo
#      -`text` não é permitido.
#      -->
identifier:
  - href  : # Preferencialmente, identificar o cadastro usando apenas
            # uma URI persistente.
  - text  : # Número ou código de acesso.
    source: # Instituição ou autoridade cadastradora, de preferência
            # identificada por uma URI.
# </lido:objectPublishedID>
# -------------------------------------------------------------------- #
########################################################################
#                         Bloco 2 : Descrição                     {{{2 #
########################################################################
# <lido:descriptiveMetadata xml:lang="pt">
# <!--
#    -Na exportação, haverá um único bloco <lido:descriptiveMetadata>
#    -incluindo os campos obrigatórios e os opcionais.
#    -->
# <lido:objectClassificationWrap>                          <!-- {{{3 -->
# <lido:classificationWrap>                                <!-- {{{4 -->
classification:
# Incluir o maior número possível de classificações conforme:
# http://terminology.lido-schema.org/ > classification_type
  - type: ""
    href: ""
# <!-- A classificação padrão será exportada automaticamente: -->
# <lido:classification lido:type="http://terminology.lido-schema.org/lido00853">
#   <!-- TODO: substituir Getty pelo nosso vocabulário -->
#   <skos:Concept rdf:about="https://vocab.getty.edu/aat/300451032">
#     <skos:prefLabel xml:lang="pt">arquitetura doméstica</skos:prefLabel>
#     <skos:prefLabel xml:lang="en">domestic architecture</skos:prefLabel>
#     <skos:mappingRelation>http://www.wikidata.org/entity/Q63127402</skos:mappingRelation>
#   </skos:Concept>
# </lido:classification>
# </lido:classificationWrap>
# -------------------------------------------------------------------- #
# <lido:objectIdentificationWrap>                          <!-- {{{3 -->
# <lido:titleWrap>                                         <!-- {{{4 -->
# Um objeto pode ser conhecido por mais de um nome.
# A lista opcional abaixo permite cadastrar títulos alternativos,
# obsoletos ou traduzidos/transliterados.
titles:
# <lido:titleSet lido:type="">
# Os tipos de título estão listados na hierarquia do Getty:
# http://vocab.getty.edu/page/aat/300417193
# Equivalentes DCMI: brandName, cited, creator, descriptive, former, inscribed, owner, popular, repository, translated, other
  - type:
# <lido:appellationValue lido:pref="http://terminology.lido-schema.org/lido00170" xml:lang="pt">
    text:
# </lido:appellationValue>
# <lido:sourceAppellation>
# A fonte do título é opcional ; um título pode ser atestado em mais de
# uma fonte. Equivalente DCMI: bibliographiCitation
    source:
      - citekey: "" # Consultar a biblioteca do grupo de pesquisa no Zotero.
        href: ""    # Caso não tenha DOI ou outro URI, omitir esta linha.
        text: ""    # Citação formatada.
# </lido:sourceAppellation>
# </lido:titleSet>
# </lido:titleWrap>
# -------------------------------------------------------------------- #
# <lido:inscriptionsWrap>                                  <!-- {{{4 -->
# Marcas, símbolos ou textos gravados na edificação, especialmente
# aqueles característicos da estrutura como um todo e não específicos a
# alguma de suas partes. Não usar para iconografia.
inscriptions:
# <lido:inscriptions lido:type="">
# Os tipos de inscrições podem seguir a hierarquia Getty:
# http://vocab.getty.edu/page/aat/300028702
  - type: ""
    transcription:
      - text: ""   # <lido:inscriptionTranscription>
# A descrição da inscrição informa local, dimensões e características.
# Os tipos de descrição podem ser extraídos da hierarquia Getty:
# http://vocab.getty.edu/page/aat/300220469
    description:   # <lido:inscriptionDescription type="">
                   # <lido:descriptiveNoteID>[index]</lido:descriptiveNoteID>
      - type  : ""
        text  : "" # <lido:descriptiveNoteValue>
        source: "" # <lido:sourceDescriptiveNote>
# </lido:inscriptions>
# </lido:inscriptionsWrap>
# -------------------------------------------------------------------- #
# </lido:objectIdentificationWrap>
########################################################################
# Os agentes listados nos campos abaixo podem ser pessoas, grupos de   #
# pessoas tratados coletivamente, ou instituições.                     #
########################################################################
#creator:            # Quem criou ou alterou a própria obra, não confundir com o campo `author` acima e nem com o autor de representações iconográficas (por exemplo, autor de um levantamento do exitente).
#  - name          : ""
#    type          : "" # personal, corporate, family, other
#    attribution   : "" # atribuição, escola de, baseado em, cópia de, etc.
#    role          : "" # creation, design, alteration, restoration
#    vocab         : "" # Caso seja usado um vocabulário controlado para padronizar...
#    refid         : "" # ...nomes de agentes, preencher as linhas `vocab` e `refid`.
#    href          : "" # Em vez de vocabulário controlado, pode-se usar um link para
#                    # identificar o agente. Caso o agente não possua site
#                    # institucional próprio, verificar se há um registro de
#                    # autoridade no Wikidata ou no vocabulário Getty.
#contributor:        # Lista de outros envolvidos no ciclo de vida da obra.
#  - name          : "" # Seguir as mesmas instruções que o campo `creator`.
#    type          : ""
#    role          : "" # Usar mesmos tipos que temporal:events:type e spatial:location:type
                        # creation, discovery, exhibition, formerOwner,
                        # formerRepository, formerSite, installation,
                        # intended, owner, performance, publication,
                        # repository, site, other
                        # alteration, broadcast, bulk, commission,
                        # creation, design, destruction, discovery,
                        # exhibition, inclusive, performance,
                        # publication, restoration, view, other
#    attribution   : ""
#    vocab         : ""
#    refid         : ""
#    href          : ""
format:
#  extent: # https://www.loc.gov/standards/vracore/schemas.html
#    - type        : "area" # area, base, circumference, count, depth, diameter, distanceBetween, height, length, width, other
#      measurements: # apenas o valor numérico, se necessário com ponto decimal
#      unit        : "m²"
#  medium: # Usar vocabulários controlados sempre que possível.
#    material:
#      - type      : "" # medium (default), support, other
#        text      : "" # Usar vocabulário controlado se possível
#        vocab     : "" # Caso use vocabulário controlado, preencher os...
#        refid     : "" # ...campos `vocab` e `refid`.
#    technique: # Processos, técnicas e métodos de produção ou restauro
#      - text      : "" # Usar vocabulário controlado se possível
#        vocab     : "" # Caso use vocabulário controlado, preencher os...
#        refid     : "" # ...campos `vocab` e `refid`.
#  inscription:
#    - author  : ""
#      position: ""
#      text    : ""
#      type    : "" # signature, mark, caption, date, text, translation, other (default)
#events:
#  ####################################################################
#  # Linha do tempo. Instruções de formatação:                        #
#  # https://timeline.knightlab.com/docs/json-format.html             #
#  # As categorias abaixo referenciam recursos externos a este site,  #
#  # em geral.                                                        #
#  ####################################################################
#  - text:              # Cada evento tem texto, mídia e data(s).
#      headline    : "" # O texto pode ser dividido em cabeçalho e conteúdo.
#      text        : ""
#    type          : "" # Tipos de datas permitidos conforme https://www.loc.gov/standards/vracore/schemas.html
#                       # alteration, broadcast, bulk, commission, creation, design,
#                       # destruction, discovery, exhibition, inclusive, performance,
#                       # publication, restoration, view, other
#                       # (o tipo de data não é usado pela linha do tempo)
#    start_date:        # Apenas a start_date é obrigatória... (VRA Core: earliestDate)
