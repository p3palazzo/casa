########################################################################
# INSTRUÇÕES DE PREENCHIMENTO                                     {{{1 #
# Este arquivo é um gabarito (template). Todas as informações de cada  #
# ficha de obra que forem idênticas ao que já consta deste arquivo     #
# NÃO PRECISAM ser repetidas na ficha.                                 #
# -------------------------------------------------------------------- #
# Todos os campos abaixo são definidos pela especificação LIDO:        #
# https://icom-documentation.mini.icom.museum/working-groups/lido/lido-overview/
# -------------------------------------------------------------------- #
# O caractere '#' indica o início de um comentário, que prossegue      #
# até o final da linha. Os comentários e as linhas que contêm apenas   #
# comentários podem ser apagados das fichas.                           #
# Linhas que contêm campos não preenchidos ou idênticos aos deste      #
# template também podem ser apagadas das fichas.                       #
# -------------------------------------------------------------------- #
# Todos os blocos que começam com um hífen `-` são listas que podem    #
# conter qualquer número de linhas ou blocos.                          #
# -------------------------------------------------------------------- #
# A ordem dos blocos não é importante, mas a hierarquia dentro de cada #
# bloco e a indentação de dois espaços por nível hierárquico, sim.     #
########################################################################
########################################################################
##                        CAMPOS OBRIGATÓRIOS                    {{{1 ##
########################################################################
########################################################################
# -------------------------------------------------------------------- #
########################################################################
#                          Bloco 1 : Cadastro                    {{{2  #
########################################################################
lang: "pt"
# <lido:lidoRecID lido:type="http://terminology.lido-schema.org/lido00100" lido:source="">
#   arqtrad/casa/PlusCode+11
#   <!--
#      -Cadastrar somente o PlusCode+11 no campo abaixo, os prefixos
#      -serão acrescentados na exportação.
#      -->
id:
    # Para calcular o PlusCode+11 (Open Location Code com precisão
    # de 11 caracteres), seguir os passos abaixo:
    #
    # 1. Instalar o plugin Lat Lon Tools no QGIS.
    # 2. Obter o polígono georreferenciado do imóvel num levantamento
    #    georreferenciado,
    #    na base cartográfica cadastral do município, ou, na falta dela,
    #    carregar o Global Building Atlas LoD1 no QGIS.
    # 3. Reprojetar o polígono para EPSG:4326 - WGS84.
    # 4. Com o polígono da edificação selecionado, rodar o comando:
    #    Vector > Geometry Tools > Centroids, com as opções
    #    "selected features only" e "Create temporary layer"
    # 5. Com o Layer "Centroids" selecionado, rodar o comando:
    #    Plugins > Lat Lon Tools > Conversions > Point Layer to Plus Codes,
    #    com a opção: "Plus Codes length" = 11.
    # 6. Clicando com o botão direito no layer escolhido, selecionar
    #    "Open Attribute Table" e copiar o valor do campo "pluscodes".
# </lido:lidoRecID>
# -------------------------------------------------------------------- #
########################################################################
#                         Bloco 2 : Descrição                     {{{2 #
########################################################################
# <lido:descriptiveMetadata xml:lang="pt">
# <!--
#    -Na exportação, haverá um único bloco <lido:descriptiveMetadata>
#    -compreendendo os campos obrigatórios e os opcionais.
#    -->
# <lido:objectClassificationWrap>                                   {{{3
# <lido:objectWorkTypeWrap>                                         {{{4
workType:
# Incluir o maior número possível de categorias tiplógicas conforme:
# http://terminology.lido-schema.org/objectWorkType_type
# Em particular, indicar o contexto (urbano/rural), morfotipologia e
# estado de conservação e de preservação.
  - type: "http://terminology.lido-schema.org/lido00767"
    href: ""
# </lido:objectWorkTypeWrap>
# -------------------------------------------------------------------- #
# <lido:classificationWrap>                                         {{{4
classification:
# Incluir o maior número possível de classificações conforme:
# http://terminology.lido-schema.org/ > classification_type
# TODO: substituir Getty pelo nosso vocabulário
# <lido:classification lido:type:"@type">
#   <skos:Concept rdf:about="@href">
  - type: "http://terminology.lido-schema.org/lido00853"
    href: "https://vocab.getty.edu/aat/300451032"
#     <skos:prefLabel xml:lang="pt">arquitetura doméstica</skos:prefLabel>
#     <skos:prefLabel xml:lang="en">domestic architecture</skos:prefLabel>
#     <skos:mappingRelation>http://www.wikidata.org/entity/Q63127402</skos:mappingRelation>
#   </skos:Concept>
# </lido:classification>
# Não alterar a classificação padrão, acima.
# Acrescentar mais blocos abaixo conforme apropriado.
# </lido:classificationWrap>
# -------------------------------------------------------------------- #
# <lido:objectIdentificationWrap>                                   {{{3
# <lido:titleWrap>                                                  {{{4
# <lido:titleSet lido:type="">
# Um objeto pode ser conhecido por mais de um nome.
# Por motivo de compatibilidade com sites, o título principal é
# cadastrado separadamente dos títulos alternativos.
# Se a edificação não tiver título próprio, usar como título o
# endereço na forma "Casa à rua Tal, 111"
# <lido:appellationValue lido:pref="http://terminology.lido-schema.org/lido00169" xml:lang="pt">
title: ""
# </lido:appellationValue>
titleType: "https://vocab.getty.edu/aat/300417199"
# Os tipos de título estão listados na hierarquia do Getty:
# http://vocab.getty.edu/page/aat/300417193
# Equivalentes DCMI: brandName, cited, creator, descriptive, former, inscribed, owner, popular, repository, translated, other
# <lido:sourceAppellation>
# A fonte do título é opcional ; um título pode ser atestado em mais de
# uma fonte. Equivalente DCMI: bibliographiCitation
titleSource:
  - citekey: "" # Consultar a biblioteca do grupo de pesquisa no Zotero.
    href: ""    # Caso não tenha DOI ou outro URI, omitir esta linha.
    text: ""    # Citação formatada.
# </lido:sourceAppellation>
# </lido:titleSet>
# </lido:titleWrap>
# -------------------------------------------------------------------- #
# DCMI coverage:spatial (continua <lido:objectIdentificationWrap>)  {{{3
# NOTA DE CONCEITO : no LIDO, a espacialização do objeto é propriedade
# subordinada à coleção museológica. Por isso, a localização geográfica
# de bens imóveis fica atrelada a uma concepção institucional de
# repositório.
spatial:
# <lido:repositoryWrap>                                             {{{4
# <lido:repositorySet lido:type="http://terminology.lido-schema.org/lido01018">
  - type: "site"                                                  # {{{5
  # O tipo de local padrão é "current location".
  # Outro tipos de localização possíveis:
  # http://terminology.lido-schema.org/repositorySet_type
  # Equivalentes DCMI:
  #   site       == http://terminology.lido-schema.org/lido01018
  #   formerSite == http://terminology.lido-schema.org/lido01020
  #   intended   == http://terminology.lido-schema.org/lido01190
  #   other
  # <lido:displayRepository xml:lang="@lang">                       {{{6
  # O nome da localização é opcional, mas recomendado para cadastrar
  # o endereço postal ou outra identificação nomeável do local.
  # TODO: Antigo mapping "name" agora é lista "display"
    display:
      - lang: "pt"
        text: ""
  # </lido:displayRepository>
  # <lido:repositoryLocation>                                       {{{6
    # <lido:placeID lido:type="http://terminology.lido-schema.org/lido00099"> {{{7
    city: "" # URI do Wikidata ou TODO: do nosso vocabulário
    # </lido:placeID>
    # <lido:namePlaceSet>                                           {{{7
    #   <appellationValue lido:pref="http://terminology.lido-schema.org/lido00169" xml:lang="pt">
    #   TODO: preencher nome e hierarquia geográfica automaticamente a partir do URI.
    #   </appellationValue>
    locationHistoric:                                             # {{{7
    # O campo `locationHistoric` se refere a designações alternativas
    # ou jursidições antigas para o mesmo local, NÃO à localização
    # original de uma construção fisicamente deslocada (para tanto,
    # cadastrar outra localização do tipo "formerSite").
    # Preencher apenas caso a nomenclatura seja relevante, por
    # exemplo para nomear as antigas províncias de Portugal ou
    # o Oeste da Bahia, que originalmente pertencia a Pernambuco,
    # ou ainda se for relevante informar uma região física.
    #   <appellationValue lido:pref="http://terminology.lido-schema.org/lido00170" xml:lang="pt">
      - type: "corporate" # DublinCore: corporate, geographic, personal, other
        href: "" # Se houver uma URI do Wikidata, não é preciso preencher os campos abaixo.
        lang: "pt"
        text: ""
    #   </appellationValue>
    # </lido:namePlaceSet>
    # <lido:partOfPlace>                                            {{{7
    #   <lido:placeID lido:type="http://terminology.lido-schema.org/lido00099">
    state: "" # Nome do estado ou distrito segundo a ISO 3166-2.
              # O nome do país está implícito.
              # TODO: Substituir código ISO por URI (automaticamente?).
              # TODO: Incluir placeClassification e hierarquia para entidades políticas.
    #   </lido:placeID>
    # </lido:partOfPlace>
    # <lido:gml>
    extent:                                                       # {{{7
      # A implantação da edificação pode ser composta por mais de um polígono.
      # <gml:Polygon><gml:pos>
      - type: "Polygon" # gml:Point, gml:LineString, gml:Polygon
        coordinates:
        # Como obter as coordenadas em formato JSON:
        # 1. Selecionar o polígono da edificação seguindo os passos 1 a 3 nas linhas 26 a 30, acima.
        # 2. Rodar o comando Plugin > Lat Lon Tools > Geometry to WKT/JSON
        # 3. Selecionar "Selected features only", "Output format type" = JSON
        # 4. Copiar o valor do campo "coordinates", incluindo os colchetes,
        #    e colar na linha acima.
        # O campo "srsName" não é usado no LIDO mas pertence ao GML.
        # Substituir o padrão pela projeção da planta cadastral municipal
        # ou do levantamento georreferenciado, caso sejam usados.
        srsName: "https://www.opengis.net/def/crs/EPSG/0/4326"
        # Identificar a fonte de autoridade da implantação
        # (não previsto no LIDO).
        # TODO: rightsSource
        source:
          type: "geographic"
          href: "https://doi.org/10.14459/2025mp1782307"
          name:
            - lang  : "en"
              text  : "GlobalBuildingAtlas"
              source: "https://github.com/zhu-xlab/GlobalBuildingAtlas"
      # </gml:pos></gml:Polygon>
    # </lido:gml>
#     </lido:repositoryLocation>
#   </lido:repositorySet>
#   Opcional: incluir localizações com o tipo "other" (no LIDO,
#   "current repository") para se referir à inclusão do objeto em
#   conjuntos tombados, classificados ou inventariados, por exemplo.
#   <lido:repositorySet lido:type="http://terminology.lido-schema.org/lido01017">
    location:                                                     # {{{7
      # Latitude e longitude devem ser derivadas do centróide do
      # polígono definido acima, ou então de uma fonte de autoridade
      # como o SICG (Brasil) ou o SIPA (Portugal).
      # Inscrever os valores sem aspas e com ponto decimal.
      # <gml:Point><gml:pos>
      type: "gml:Point" # Não alterar.
      lat:
      lon:
      alt: # Em metros acima do nível do mar. Não usado no LIDO.
      # O campo "srsName" não é usado no LIDO mas pertence ao GML.
      # Substituir o valor padrão pela projeção da planta cadastral
      # ou do levantamento georreferenciado, se for o caso.
      srsName: "https://www.opengis.net/def/crs/EPSG/0/4326"
      # Identificar a fonte de autoridade das coordenadas
      # (não previsto no LIDO).
      # TODO: rightsSource
      source:
        type : "geographic" # DublinCore: corporate, geographic, personal, other
        refid: ""
        href : ""
        name:
          - lang  : "pt"
            text  : ""
            source: ""
      # </gml:pos></gml:Point>
    - type: "other"                                               # {{{5
    # <lido:displayRepository>                                      {{{6
      display: # Opcional
        - lang: "pt"
          text: ""
    # </lido:displayRepository>
    # <lido:repositoryName>                                         {{{6
      name: # Órgão responsável pela classificação.
            # LIDO não prevê um tipo para o <repositoryName>.
            # DublinCore: corporate, geographic, personal, other
        type: "corporate"
        # TODO: revisar campos abaixo com base no esquema LIDO.
        legalBodyID:
          - refid: ""
        legalBodyName:
          - lang  : "pt"
            text  : ""
            source: ""
        legalBodyWeblink:
          - href: ""
    # </lido:repositoryName>
    # <lido:workID>
      workID:
        - refid: ""
    # </lido:workID>
    # </lido:repositoryName>
    # <lido:repositoryLocation>                                     {{{6
    # Identificar localização como no exemplo acima.
    # </lido:repositoryLocation>
#   </lido:repositorySet>
# </lido:repositoryWrap>
# -------------------------------------------------------------------- #
# (Continuação de <lido:objectIdentificationWrap>)                  {{{3
# </lido:objectIdentificationWrap>
date: # Data da última atualização da ficha no nosso repositório no formato ISO 8601 (AAAA-MM-DD). # lido:recordInfoSet > lido:recordMetadataDate
author: "" # Quem incluiu a ficha no repositório e preencheu esta ficha. Não confundir com o campo `creator` abaixo.
# </lido:descriptiveMetadata>
########################################################################
########################################################################
##                         CAMPOS OPCIONAIS                      {{{1 ##
########################################################################
########################################################################
#             Omitir as linhas ou os blocos não preenchidos            #
########################################################################
#                          Bloco 1 : Cadastro                     {{{2 #
########################################################################
# <lido:objectPublishedID lido:type="@type">                        {{{3
#   <!--
#      -Outros cadastros existentes no SICG ou no SIPA, catálogos,
#      -inventários, manifesto IIIF, Wikidata, etc.
#      -lido:type --- http://terminology.lido-schema.org/identifier_type
#      -
#      -Na exportação, o tipo deve ser automaticamente configurado como
#      -URI: http://terminology.lido-schema.org/lido00099
#      -se o campo `href` existir, caso contrário será considerado
#      -Local Identifier: http://terminology.lido-schema.org/lido00100
#      -
#      -Quando existir uma URI, o campo `source` é opcional, mas o campo
#      -`text` não é permitido.
#      -->
identifier:
  - href  : "" # Se esta linha existir, `type` será URI.
    text  : "" # Se esta linha existir, `type` será local.
    refid : "" # No formato repositoryID/objectID
    source: "" # Instituição ou autoridade cadastradora, de preferência
               # identificada por uma URI.
# </lido:objectPublishedID>
# -------------------------------------------------------------------- #
########################################################################
#                         Bloco 2 : Descrição                     {{{2 #
########################################################################
# <lido:descriptiveMetadata xml:lang="pt">
# <!--
#    -Na exportação, haverá um único bloco <lido:descriptiveMetadata>
#    -compreendendo os campos obrigatórios e os opcionais.
#    -->
# <lido:objectIdentificationWrap>                                   {{{3
# <lido:titleWrap>                                                  {{{4
# Um objeto pode ser conhecido por mais de um nome.
# A lista opcional abaixo permite cadastrar títulos alternativos,
# obsoletos ou traduzidos/transliterados.
titles:
# <lido:titleSet lido:type="">
# Os tipos de título estão listados na hierarquia do Getty:
# http://vocab.getty.edu/page/aat/300417193
# Equivalentes DCMI: brandName, cited, creator, descriptive, former, inscribed, owner, popular, repository, translated, other
  - type: ""
    lang: "pt"
    text: "" # <lido:appellationValue lido:pref="http://terminology.lido-schema.org/lido00170" xml:lang="pt">
#   <lido:sourceAppellation>
    # A fonte do título é opcional ; um título pode ser atestado em mais
    # de uma fonte. Equivalente DCMI: bibliographiCitation
    source:
      - refid: "" # Usar citekey na biblioteca do grupo de pesquisa no Zotero.
        href : "" # Caso não tenha DOI ou outro URI, omitir esta linha.
        text : "" # Citação formatada.
#   </lido:sourceAppellation>
# </lido:titleSet>
# </lido:titleWrap>
# -------------------------------------------------------------------- #
# <lido:inscriptionsWrap>                                           {{{4
# Marcas, símbolos ou textos gravados na edificação, especialmente
# aqueles referentes à estrutura como um todo e não específicos a
# alguma de suas partes. Não usar para iconografia.
inscriptions:
# <lido:inscriptions lido:type="@type">
# Os tipos de inscrições podem seguir a hierarquia Getty:
# http://vocab.getty.edu/page/aat/300028702
# Equivalentes VRA Core:
# signature, mark, caption, date, text, translation, other
  - type: ""
    transcription: # <lido:inscriptionTranscription xml:lang="@lang">
      - lang: ""
        text: ""
# A descrição da inscrição informa local, dimensões e características.
# Os tipos de descrição podem ser extraídos da hierarquia Getty:
# http://vocab.getty.edu/page/aat/300220469
    description:   # <lido:inscriptionDescription type="@type">
                   # <lido:descriptiveNoteID>[index]</lido:descriptiveNoteID>
      - type:
        value:     # <lido:descriptiveNoteValue xml:lang="@lang">
          - lang: ""
            text: ""
        source: "" # <lido:sourceDescriptiveNote>
# </lido:inscriptions>
# </lido:inscriptionsWrap>
# -------------------------------------------------------------------- #
# <lido:objectDescriptionWrap>                                      {{{4
description:
  # <lido:objectDescriptionSet>
  - note:
      - lang: "pt"
        value: "" # <lido:descriptiveNoteValue xml:lang="@lang">
    author: "" # ORCID do membro da equipe responsável pelo conteúdo.
               # Não incluir se o grupo `source` for preenchido.
    source:    # TODO: Formatar como os demais campos `source`.
               # Não incluir se o campo `author` for preenchido.
    rights: # http://terminology.lido-schema.org/rightsType_type
      type: "http://terminology.lido-schema.org/lido00921"
      date:
        earliestDate: # ISO 8601.
        latestDate:   # Domínio público não tem latestDate.
      holder:  # TODO: Formatar como os demais campos `legalBody`.
      href: "" # URI de uma licença genérica. Omitir se não houver.
      value:   # Se não houver `href`, preencher este grupo.
        - lang: "pt"
          text: ""
    credit: "" # Representação textual de autoria e direitos.
  # </lido:objectDescriptionSet>
# </lido:objectDescriptionWrap>
# -------------------------------------------------------------------- #
# DCMI format (continua <lido:objectIdentificationWrap>)            {{{3
format:
# <lido:objectMeasurementsWrap>                                     {{{4
  extent:
    # <lido:displayObjectMeasurements>                              {{{5
    display:
      - lang: "pt"
        text: ""
    # </lido:displayObjectMeasurements>
    # <lido:objectMeasurementsSet>                                  {{{5
    measurements:
      # Repetir para quantas medidas sejam relevantes.
        # <lido:measurementType>
        # http://terminology.lido-schema.org/objectMeasurementsSet_type
        # ATENÇÃO! A caracterização do tipo de medidas difere com
        # respeito aos demais grupos: ela tem uma <tag> própria em vez
        # de um atributo lido:type na tag principal.
      - type: "http://terminology.lido-schema.org/lido00927"
        # </lido:measurementType>
        value:     # <lido:measurementValue>
        # TODO: formatar campos skos:Concept como workType, etc.
        unit: ""   # <lido:measurementUnit><skos:Concept>
        extent: "" # <lido:extentMeasurements><skos:Concept [Objects Facet]>
        # <lido:qualifierMeasurements>
        # Vocabulário controlado : http://vocab.getty.edu/page/aat/300435720
        qualifier: ""
        # </lido:qualifierMeasurements>
        format: # <lido:formatMeasurements><skos:Concept>
        shape:  # <lido:shapeMeasurements><skos:Concept>
        scale:  # <lido:scaleMeasurements><skos:Concept>
#   </lido:objectMeasurementsSet>
# </lido:objectMeasurementsWrap>
# -------------------------------------------------------------------- #
# <lido:objectMaterialsTechWrap> (DCMI: format:medium)              {{{4
# Usar discernimento para 
# Identificar sistemas, materiais e técnicas que interessam ao
# conhecimento da edificação no seu conjunto.
  # <lido:objectMaterialsTechSet>
  medium:
    # <lido:displayMaterialsTech>                                   {{{5
    display:
      - lang: "pt"
        text: ""
    # </lido:displayMaterialsTech>
    # <lido:materialsTech type="http://terminology.lido-schema.org/lido00132"> {{{5
    material:
      - type: "support" # medium, support, other
      # Repetir quantas vezes necessário.
      # <lido:termMaterialsTech><skos:Concept>
      # Usar vocabulário controlado em :
      # http://vocab.getty.edu/page/aat/300010358
        term:
      # </lido:termMaterialsTech>
        extent:  # <lido:extentMaterialsTech> Formatar como <lido:extentMeasurements>.
        source:  # <lido:sourceMaterialsTech> Formatar como os demais grupos `source`.
    # </lido:materialsTech>
    # <lido:materialsTech type="http://terminology.lido-schema.org/lido00131"> {{{5
    technique:
      - type: "support" # medium, support, other
      # Repetir quantas vezes necessário.
      # <lido:termMaterialsTech><skos:Concept>
      # Usar vocabulário controlado em :
      # http://vocab.getty.edu/page/aat/300010358
        term:
      # </lido:termMaterialsTech>
        extent:  # Formatar como <lido:extentMeasurements>.
        source:  # Formatar como os demais grupos `source`.
#     </lido:materialsTech>
#   </lido:objectMaterialsTechSet>
# </lido:objectMaterialsTechWrap>
# -------------------------------------------------------------------- #
# /DCMI format
# </lido:objectIdentificationWrap>
# -------------------------------------------------------------------- #
# <lido:eventWrap> (DCMI coverage:temporal)                        {{{3
########################################################################
# Linha do tempo. Instruções de formatação:                            #
# https://timeline.knightlab.com/docs/json-format.html                 #
# As categorias abaixo referenciam recursos externos a este site,      #
# em geral.                                                            #
########################################################################
# TODO: compatibilizar formato KnightLab com LIDO.
# O LIDO prevê um único campo de texto, mas o TimelineJS divide em
# `headline` e `text`.
# Além disso, `display_date` faz parte do campo <lido:displayEvent>.
events:
# <lido:eventSet lido:sortorder="n">                                {{{4
  # <lido:displayEvent xml:lang="@lang">                            {{{5
  - text:
      lang: "pt"   # Não usado pelo TimelineJS
      headline: ""
      text: ""     # associar a <lido:eventDescriptionSet>?
  # </lido:displayEvent>
    # Os campos abaixo não são usados pelo TimelineJS.
    sortorder: # 1-n
# <lido:event>                                                      {{{5
    # O campo ID (`href`) é opcional e diz respeito, principalmente, a
    # eventos famosos que estejam cadastrados numa base como o Wikidata.
    href: "" # <lido:eventID>Wikidata</lido:eventID>
  #   <lido:eventType><skos:Concept>                                {{{6
  #   Equivalentes DCMI:
  #   alteration, broadcast, bulk, commission, creation, design,
  #   destruction, discovery, exhibition, inclusive, performance,
  #   publication, restoration, view, other
    type: "" # http://terminology.lido-schema.org/eventType
  #  </lido:eventType>
  #  <lido:roleInEvent> ??????????????????
  #  <lido:eventActor>                                              {{{6
    actor:
      # <lido:displayActorInRole>                                   {{{7
      - display:
          - lang: "pt"
            text: ""
      # </lido:displayActorInRole>
    # <lido:actorInRole>                                            {{{7
      # <lido:actor lido:type="@type">                              {{{8
      # Lista de tipos na hierarquia:
      # http://terminology.lido-schema.org/actor_type
      # Equivalentes DCMI: personal, corporate, family, other
        type: "personal"
      # <lido:actorID lido:type="http://terminology.lido-schema.org/lido00099">
      # se a linha `href` existir, lido:type será URI. Usar Wikidata.
        href: ""
      # </lido:actorID>
